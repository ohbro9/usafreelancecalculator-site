<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Page Not Found | USA Freelance Calculator</title>
  <meta name="robots" content="noindex"/>
  <meta name="theme-color" content="#0f172a"/>
  <link rel="icon" href="assets/icon.svg" type="image/svg+xml"/>
  <style>
    :root{
      --bg:#07101d;
      --panel:#0f172a;
      --line:rgba(255,255,255,.08);
      --text:#eef4ff;
      --muted:#95a3bb;
      --accent:#f2c66d;
      --accent-2:#ff7a00;
      --shadow:0 30px 80px rgba(0,0,0,.35);
      --radius:28px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:24px;
      font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(242,198,109,.10), transparent 24%),
        radial-gradient(circle at bottom right, rgba(255,122,0,.08), transparent 22%),
        linear-gradient(180deg,#050c16 0%, #07101d 100%);
    }
    .card{
      width:min(100%,560px);
      padding:32px;
      border-radius:var(--radius);
      border:1px solid var(--line);
      background:linear-gradient(180deg,rgba(15,23,42,.94),rgba(9,16,29,.96));
      box-shadow:var(--shadow);
    }
    .eyebrow{
      display:inline-flex;
      align-items:center;
      gap:8px;
      min-height:34px;
      padding:0 14px;
      border-radius:999px;
      background:rgba(242,198,109,.10);
      border:1px solid rgba(242,198,109,.18);
      color:var(--accent);
      font-size:12px;
      font-weight:800;
      letter-spacing:.12em;
      text-transform:uppercase;
    }
    h1{
      margin:18px 0 12px;
      font-size:44px;
      line-height:1;
      letter-spacing:-.05em;
    }
    p{
      margin:0 0 22px;
      color:var(--muted);
      font-size:17px;
      line-height:1.6;
    }
    .actions{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
    }
    a{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:52px;
      padding:0 18px;
      border-radius:16px;
      font-weight:800;
      text-decoration:none;
      transition:transform .18s ease, opacity .18s ease;
    }
    a:hover{transform:translateY(-1px)}
    .primary{
      background:linear-gradient(135deg,var(--accent),var(--accent-2));
      color:#0f172a;
    }
    .secondary{
      border:1px solid var(--line);
      color:var(--text);
      background:rgba(255,255,255,.03);
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="eyebrow">404 • Toolkit</div>
    <h1>Page not found</h1>
    <p>The link you opened does not match a live toolkit page. Use the homepage to jump back into the calculators.</p>
    <div class="actions">
      <a class="primary" href="index.html">Go To Toolkit Home</a>
      <a class="secondary" href="/platform-fee-calculator.html">Open Platform Fees</a>
    </div>
  </main>
</body>
</html>
